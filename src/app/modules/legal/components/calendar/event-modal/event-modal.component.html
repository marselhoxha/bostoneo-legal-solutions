<!--
  Event create / edit modal — Rox-styled chrome around the EventForm. The
  view-mode branch was retired in favor of CalendarEventViewModalComponent
  (the cal-d1/d2-aware read-only summary), so this template is now create +
  edit only. Same container shape as the view modal so the two read as a
  pair in the same design language.
-->
<div class="cem-modal">
  <header class="cem-head">
    <div class="cem-head-text">
      <h4 class="cem-title">{{ title }}</h4>
      <p class="cem-sub">{{ event?.id ? 'Update event details' : 'Create a new calendar event' }}</p>
    </div>
    <button type="button" class="cem-close" (click)="onCancel()" aria-label="Close">
      <i-lucide name="x" [size]="16"></i-lucide>
    </button>
  </header>

  <div class="cem-body">
    <!-- In-flight save indicator. Inline (no overlay) so the form keeps its
         shape; only blocks the action buttons via [disabled] in event-form. -->
    <div *ngIf="loading" class="cem-loading" aria-live="polite">
      <i-lucide name="loader-2" [size]="14" class="spin"></i-lucide>
      <span>Saving event…</span>
    </div>

    <div *ngIf="errorMessage" class="cem-error" role="alert">
      <i-lucide name="alert-circle" [size]="14"></i-lucide>
      <span>{{ errorMessage }}</span>
    </div>

    <app-event-form
      *ngIf="!viewModeInternal"
      [event]="event"
      [caseId]="caseId"
      (save)="onSave($event)"
      (cancel)="onCancel()">
    </app-event-form>
  </div>
</div>
