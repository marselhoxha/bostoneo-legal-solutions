<!--
  Event create/edit form — Rox-styled. Visual language matches the cal-d2
  view modal: stacked .field rows with uppercase muted labels and elevated
  field surfaces. The form group bindings are unchanged from the legacy
  Bootstrap version, so the existing TS save/validation logic still owns
  every interaction.
-->
<form [formGroup]="eventForm" (ngSubmit)="onSubmit()" class="cef-form">

  <!-- Title — required, single column. -->
  <div class="cef-field">
    <label for="title" class="cef-label">Event title <span class="cef-req">*</span></label>
    <input
      id="title"
      type="text"
      class="cef-input"
      formControlName="title"
      placeholder="e.g. Sullivan deposition"
    >
    <div *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched" class="cef-error">
      Title is required.
    </div>
  </div>

  <!-- Description — multiline, single column. -->
  <div class="cef-field">
    <label for="description" class="cef-label">Description</label>
    <textarea
      id="description"
      class="cef-input cef-textarea"
      formControlName="description"
      rows="3"
      placeholder="Optional context — agenda, attendees, location notes."
    ></textarea>
  </div>

  <!--
    Start / end time. Flatpickr binds to the inputs via the template refs;
    leaving the bare <input> here keeps that wiring intact. The wrapping
    .cef-input-wrap gives the input a leading icon slot.
  -->
  <div class="cef-grid-2">
    <div class="cef-field">
      <label for="startTime" class="cef-label">Start time <span class="cef-req">*</span></label>
      <div class="cef-input-wrap">
        <i-lucide name="calendar" [size]="14" class="cef-input-ico"></i-lucide>
        <input
          id="startTime"
          class="cef-input flatpickr-input"
          formControlName="startTime"
          placeholder="Select date and time"
          #startTimeFlatpickr
        >
      </div>
      <div *ngIf="eventForm.get('startTime')?.invalid && eventForm.get('startTime')?.touched" class="cef-error">
        Start time is required.
      </div>
    </div>

    <div class="cef-field">
      <label for="endTime" class="cef-label">End time</label>
      <div class="cef-input-wrap">
        <i-lucide name="clock" [size]="14" class="cef-input-ico"></i-lucide>
        <input
          id="endTime"
          class="cef-input flatpickr-input"
          formControlName="endTime"
          placeholder="Optional"
          #endTimeFlatpickr
        >
      </div>
    </div>
  </div>

  <!-- Location — single column. -->
  <div class="cef-field">
    <label for="location" class="cef-label">Location</label>
    <div class="cef-input-wrap">
      <i-lucide name="map-pin" [size]="14" class="cef-input-ico"></i-lucide>
      <input
        id="location"
        type="text"
        class="cef-input"
        formControlName="location"
        placeholder="Courtroom, office, conference room…"
      >
    </div>
  </div>

  <!-- Event type / status — paired dropdowns. -->
  <div class="cef-grid-2">
    <div class="cef-field">
      <label for="eventType" class="cef-label">Event type <span class="cef-req">*</span></label>
      <select id="eventType" class="cef-input cef-select" formControlName="eventType">
        <option [ngValue]="null" disabled>Select event type</option>
        <option *ngFor="let type of eventTypes" [value]="type">{{ type | titlecase }}</option>
      </select>
      <div *ngIf="eventForm.get('eventType')?.invalid && eventForm.get('eventType')?.touched" class="cef-error">
        Event type is required.
      </div>
    </div>

    <div class="cef-field">
      <label for="status" class="cef-label">Status <span class="cef-req">*</span></label>
      <select id="status" class="cef-input cef-select" formControlName="status">
        <option [ngValue]="null" disabled>Select status</option>
        <option *ngFor="let status of statuses" [value]="status">{{ status | titlecase }}</option>
      </select>
      <div *ngIf="eventForm.get('status')?.invalid && eventForm.get('status')?.touched" class="cef-error">
        Status is required.
      </div>
    </div>
  </div>

  <!-- Linked case / reminder — paired dropdowns. -->
  <div class="cef-grid-2">
    <div class="cef-field">
      <label for="caseId" class="cef-label">Associated case</label>
      <select id="caseId" class="cef-input cef-select" formControlName="caseId">
        <option [value]="null">None</option>
        <option *ngFor="let case of cases$ | async" [value]="case.id">{{ case.title }}</option>
      </select>
    </div>

    <div class="cef-field">
      <label for="reminderMinutes" class="cef-label">Reminder</label>
      <select id="reminderMinutes" class="cef-input cef-select" formControlName="reminderMinutes">
        <option [ngValue]="0">No reminder</option>
        <option [ngValue]="5">5 minutes before</option>
        <option [ngValue]="15">15 minutes before</option>
        <option [ngValue]="30">30 minutes before</option>
        <option [ngValue]="60">1 hour before</option>
        <option [ngValue]="120">2 hours before</option>
        <option [ngValue]="1440">1 day before</option>
      </select>
      <!-- Reminder-already-sent warning. Inline alert, scoped color. -->
      <div
        *ngIf="event && event['reminderSent'] === true && eventForm.get('reminderMinutes')?.value > 0"
        class="cef-hint warn"
      >
        <i-lucide name="alert-triangle" [size]="13"></i-lucide>
        A reminder has already been sent. Saving will reset the reminder status.
      </div>
    </div>
  </div>

  <!-- All-day toggle + notification methods (notification only when reminder set). -->
  <div class="cef-grid-2">
    <div class="cef-field">
      <label class="cef-label">All-day event</label>
      <label class="cef-switch">
        <input type="checkbox" formControlName="allDay">
        <span class="cef-switch-track"><span class="cef-switch-thumb"></span></span>
        <span class="cef-switch-text">{{ eventForm.get('allDay')?.value ? 'Yes' : 'No' }}</span>
      </label>
    </div>

    <div class="cef-field" *ngIf="eventForm.get('reminderMinutes')?.value > 0">
      <label class="cef-label">Notification methods</label>
      <div class="cef-toggle-row">
        <button
          type="button"
          class="cef-toggle"
          [class.active]="eventForm.get('emailNotification')?.value"
          (click)="toggleEmailNotification()"
        >
          <i-lucide name="mail" [size]="13"></i-lucide>
          Email
        </button>
        <button
          type="button"
          class="cef-toggle"
          [class.active]="eventForm.get('pushNotification')?.value"
          (click)="togglePushNotification()"
        >
          <i-lucide name="bell" [size]="13"></i-lucide>
          Push
        </button>
      </div>
      <!-- Hidden inputs maintain form bindings for the toggle buttons above. -->
      <div class="cef-visually-hidden">
        <input type="checkbox" id="emailNotification" formControlName="emailNotification">
        <input type="checkbox" id="pushNotification" formControlName="pushNotification">
      </div>
    </div>
  </div>

  <!-- Action bar — same hierarchy as the view modal: dismiss left, primary right. -->
  <div class="cef-actions">
    <button type="button" class="cef-btn" (click)="onCancel()">
      Cancel
    </button>
    <button
      type="submit"
      class="cef-btn cef-btn-primary"
      [disabled]="eventForm.invalid"
    >
      <i-lucide name="check" [size]="14"></i-lucide>
      {{ event?.id ? 'Update event' : 'Save event' }}
    </button>
  </div>
</form>
