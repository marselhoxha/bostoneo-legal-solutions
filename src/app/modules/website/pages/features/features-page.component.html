<!-- ═══════════════ HERO ═══════════════ -->
<section class="features-hero w-section-dark">
  <div class="w-container">
    <div class="hero-badge">
      <i class="ri-layout-grid-line"></i> Full Platform Overview
    </div>
    <h1>Everything Your Firm Needs</h1>
    <p class="hero-subtitle">One platform. One login. Zero compromises.</p>
  </div>
</section>

<!-- ═══════════════ CATEGORY FILTER ═══════════════ -->
<div class="filter-bar">
  <div class="w-container">
    <div class="filter-pills">
      <button
        *ngFor="let pill of filterPills"
        class="filter-pill"
        [class.active]="activeFilter === pill.id"
        (click)="scrollToCategory(pill.id)">
        <i [class]="pill.icon"></i>
        <span>{{ pill.label }}</span>
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════ FEATURE CATEGORIES ═══════════════ -->
<div class="features-body">
  <section
    *ngFor="let cat of categories; let odd = odd"
    [id]="'category-' + cat.id"
    class="category-section"
    [class.alt-bg]="odd">
    <div class="w-container">

      <!-- Category header -->
      <div class="category-header" wScrollAnimate>
        <div class="category-icon" [ngClass]="cat.colorClass">
          <i [class]="cat.icon"></i>
        </div>
        <div>
          <h2 class="category-title">{{ cat.headline }}</h2>
          <p class="category-desc">{{ cat.description }}</p>
        </div>
      </div>

      <!-- Screenshot (if available) -->
      <div class="category-screenshot" *ngIf="cat.screenshot" wScrollAnimate>
        <w-app-window
          [title]="cat.screenshotTitle!"
          [imageSrc]="cat.screenshot"
          [imageAlt]="cat.screenshotAlt!"
          [small]="true">
        </w-app-window>
      </div>

      <!-- Feature cards grid -->
      <div class="feature-grid w-stagger" wScrollAnimate>
        <div class="w-feature-card" *ngFor="let item of cat.items">
          <div class="w-feature-icon" [ngClass]="item.colorClass">
            <i [class]="item.icon"></i>
          </div>
          <h4>{{ item.title }}</h4>
          <p class="card-desc">{{ item.description }}</p>
          <ul class="card-bullets">
            <li *ngFor="let bullet of item.bullets">
              <i class="ri-check-line"></i>
              <span>{{ bullet }}</span>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </section>
</div>

<!-- ═══════════════ FINAL CTA ═══════════════ -->
<w-cta-section
  heading="See It in Action"
  subtext="Book a 30-minute demo and we'll walk through every feature using your actual workflow."
  [showFeatures]="false">
</w-cta-section>
