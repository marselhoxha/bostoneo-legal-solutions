<div class="tasks-page">
  <header class="page-head">
    <div class="head-row">
      <div>
        <h2>Tasks</h2>
      </div>
      <div class="head-actions">
        <div class="view-switcher" role="tablist" aria-label="View">
          <button type="button" class="chip" [class.active]="activeView === 'inbox'" (click)="switchView('inbox')">
            <span class="chip-icon">&#x229E;</span> List
          </button>
          <button type="button" class="chip" [class.active]="activeView === 'pipeline'" (click)="switchView('pipeline')" disabled title="Phase 2">
            <span class="chip-icon">&#x25A4;</span> Pipeline
          </button>
          <button type="button" class="chip" [class.active]="activeView === 'workload'" (click)="switchView('workload')" disabled title="Phase 3">
            <span class="chip-icon">&#x1F465;</span> Workload
          </button>
        </div>
        <button type="button" class="btn">
          <kbd class="kbd-hint">&#x2318;K</kbd> Search
        </button>
        <button type="button" class="btn">Filter</button>
        <button type="button" class="btn-primary btn">+ New task</button>
      </div>
    </div>
  </header>

  <ng-container [ngSwitch]="activeView">
    <app-inbox-view *ngSwitchCase="'inbox'"></app-inbox-view>
    <div class="placeholder" *ngSwitchCase="'pipeline'">Pipeline view ships in Phase 2.</div>
    <div class="placeholder" *ngSwitchCase="'workload'">Workload view ships in Phase 3.</div>
  </ng-container>

  <!-- Unified task drawer — opens when ?task=:id is in the URL. -->
  <app-task-drawer></app-task-drawer>
</div>
