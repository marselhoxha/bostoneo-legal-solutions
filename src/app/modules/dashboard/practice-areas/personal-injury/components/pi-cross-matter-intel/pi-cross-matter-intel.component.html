<!--
  Cross-Matter Intelligence — markup mirrors the existing
  attorney-dashboard.component.html lines 622-643. Renders only when the
  backend produced a pattern (the endpoint returns `null` when not enough
  cases are available, matching the original `crossMatterPattern` guard).
-->
<div class="cross-matter-intel" *ngIf="!loading() && pattern() as p">
  <div class="cmi-header">
    <span class="cmi-icon"><i class="ri-pulse-line"></i></span>
    <h4>{{ p.title }}</h4>
  </div>
  <p class="cmi-summary">{{ p.summary }}</p>
  <div class="cmi-matters">
    <span *ngFor="let m of p.matters" class="cmi-matter-pill">
      <span class="cmi-matter-avatar" [style.background]="m.bg">{{ m.initials }}</span>
      {{ m.label }}
    </span>
  </div>
  <div class="cmi-actions">
    <button class="cmi-btn cmi-btn-pri" (click)="onCrossMatterPrimary()">
      <i class="ri-file-text-line"></i> {{ p.primaryLabel }}
    </button>
    <button class="cmi-btn cmi-btn-out" (click)="onCrossMatterSecondary()">
      {{ p.secondaryLabel }}
    </button>
  </div>
</div>
