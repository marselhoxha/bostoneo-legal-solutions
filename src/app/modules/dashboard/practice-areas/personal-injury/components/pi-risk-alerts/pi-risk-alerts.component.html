<!--
  Risk Alerts band — markup mirrors the existing
  attorney-dashboard.component.html lines 597-620 (rail variant). The "review"
  CTA toggles between a danger and a neutral style based on whether the top
  alert is critical, matching the original behavior.
-->
<div class="risk-alerts-band mb-3"
     *ngIf="!loading() && alerts().length > 0"
     [ngClass]="{'has-critical': alerts()[0]?.severity === 'critical'}">
  <div class="risk-alerts-header">
    <span class="risk-alerts-icon"><i class="ri-shield-flash-line"></i></span>
    <span class="risk-alerts-title">{{ alerts().length }} risk alert<ng-container *ngIf="alerts().length !== 1">s</ng-container></span>
    <button class="btn btn-soft-danger btn-sm" (click)="onRiskAction()" *ngIf="alerts()[0]?.severity === 'critical'">
      Review now <i class="ri-arrow-right-line align-middle ms-1"></i>
    </button>
    <button class="btn btn-soft-secondary btn-sm" (click)="onRiskAction()" *ngIf="alerts()[0]?.severity !== 'critical'">
      Review <i class="ri-arrow-right-line align-middle ms-1"></i>
    </button>
  </div>
  <div class="risk-alerts-list">
    <div *ngFor="let alert of alerts()" class="risk-alert-item" [ngClass]="'severity-' + alert.severity">
      <div class="risk-alert-dot"></div>
      <div class="risk-alert-content">
        <div class="risk-alert-title">{{ alert.title }}</div>
        <div class="risk-alert-desc">{{ alert.description }}</div>
      </div>
    </div>
  </div>
</div>
