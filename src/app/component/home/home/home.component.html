<!-- Role-Based Dashboard Container -->
<!-- Role-Based Dashboard Selection -->
<div [ngSwitch]="userRole">

    <!-- SuperAdmin Redirect -->
    <div *ngSwitchCase="'SUPERADMIN'">
      <div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="text-center">
          <div class="spinner-grow text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
          <h5 class="text-primary">Redirecting to Command Center...</h5>
        </div>
      </div>
    </div>

      <!-- Admin Dashboard -->
      <div *ngSwitchCase="'ADMIN'">
        <app-admin-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-admin-dashboard>
                  </div>

    <!-- Attorney Dashboard -->
      <div *ngSwitchCase="'ATTORNEY'">
        <app-attorney-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-attorney-dashboard>
      </div>

    <!-- Client Dashboard -->
      <div *ngSwitchCase="'CLIENT'">
        <app-client-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-client-dashboard>
      </div>
        
    <!-- Secretary Dashboard -->
      <div *ngSwitchCase="'SECRETARY'">
        <app-secretary-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-secretary-dashboard>
      </div>

      <!-- Paralegal Dashboard -->
      <div *ngSwitchCase="'PARALEGAL'">
        <app-paralegal-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-paralegal-dashboard>
    </div>
       
      <!-- Manager Dashboard -->
      <div *ngSwitchCase="'MANAGER'">
        <app-manager-dashboard 
          [currentUser]="currentUser" 
          [isDarkMode]="isDarkMode">
        </app-manager-dashboard>
                </div>
                
      <!-- Default/Fallback Dashboard -->
      <div *ngSwitchDefault>
      <div class="row">
          <div class="col-12">
          <div class="card">
              <div class="card-body text-center">
                <div class="avatar-md mx-auto mb-4">
                  <div class="avatar-title bg-light rounded-circle text-primary h1">
                    <i class="ri-user-line"></i>
            </div>
              </div>
                <h5 class="card-title">Welcome to Legience</h5>
                <p class="card-text text-muted">
                  Your role is being determined. Please wait a moment or contact your administrator if this persists.
                </p>
                <div class="mt-3">
                  <small class="text-muted">
                    Current Role: {{ userRole || 'Loading...' }} | 
                    User: {{ currentUser?.email || 'Not logged in' }}
                  </small>
                    </div>
                <div class="mt-4">
                  <button type="button" class="btn btn-primary" (click)="ngOnInit()">
                    <i class="ri-refresh-line me-1"></i>
                    Refresh
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

                </div>
