<ng-container *ngIf="(newClientState$ | async) as state" [ngSwitch]="state.dataState">
    <ng-container *ngSwitchCase="DataState.LOADED">
      <div class="modal-content border-0 new-client-modal">
        <!-- Accent bar -->
        <div class="new-client-accent"></div>

        <!-- Header -->
        <div class="new-client-header">
          <div class="d-flex align-items-center gap-3">
            <div class="new-client-icon">
              <i class="ri-user-add-line"></i>
            </div>
            <div>
              <h5 class="fw-semibold mb-0" style="font-size: 16px; color: var(--vz-heading-color);">New Client</h5>
              <span class="text-muted" style="font-size: 12px;">Create a new client record for your organization</span>
            </div>
          </div>
          <button type="button" class="new-client-close" (click)="closeModal()">
            <i class="ri-close-line"></i>
          </button>
        </div>

        <!-- Body -->
        <div class="new-client-body">
          <div *ngIf="state.error" class="alert alert-danger border-0 alert-dismissible fade show mb-3" role="alert">
            <i class="ri-error-warning-line me-2"></i>{{ state.error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>

          <form #newClientForm="ngForm" (ngSubmit)="createClient(newClientForm)">
            <!-- Section: Personal -->
            <div class="new-client-section-label"><i class="ri-user-line"></i>Personal Information</div>
            <div class="row g-3 mb-4">
              <div class="col-12">
                <label class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" ngModel name="name" required placeholder="Enter full name">
              </div>
            </div>

            <!-- Section: Contact -->
            <div class="new-client-section-label"><i class="ri-contacts-line"></i>Contact Details</div>
            <div class="row g-3 mb-4">
              <div class="col-6">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" ngModel name="email" required placeholder="email@example.com">
              </div>
              <div class="col-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" ngModel name="phone" placeholder="(555) 123-4567">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" ngModel name="address" placeholder="Street, City, State, ZIP">
              </div>
            </div>

            <!-- Section: Account -->
            <div class="new-client-section-label"><i class="ri-settings-3-line"></i>Account Details</div>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Client Type</label>
                <select class="form-select" name="type" ngModel="INDIVIDUAL">
                  <option value="INDIVIDUAL">Individual</option>
                  <option value="BUSINESS">Business</option>
                  <option value="INSTITUTION">Institution</option>
                </select>
              </div>
              <div class="col-6">
                <input type="hidden" name="status" ngModel="ACTIVE">
                <input type="hidden" name="imageUrl" ngModel="">
              </div>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="new-client-footer">
          <button type="button" class="btn btn-soft-secondary" (click)="closeModal()">Cancel</button>
          <button type="button" class="btn btn-primary"
            [disabled]="state.dataState === DataState.LOADING || newClientForm.invalid || newClientForm.pristine || (isLoading$ | async)"
            (click)="createClient(newClientForm)">
            <span *ngIf="isLoading$ | async" class="spinner-border spinner-border-sm me-1" style="width: 14px; height: 14px;"></span>
            {{ (isLoading$ | async) ? 'Creating...' : 'Save Client' }}
          </button>
        </div>
      </div>
    </ng-container>
  </ng-container>
