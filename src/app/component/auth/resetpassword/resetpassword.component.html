<ng-container *ngIf="(resetPasswordState$ | async) as state">

  <!-- Request Form -->
  <div *ngIf="!state.registerSuccess" class="login-page d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card">

      <!-- Logo -->
      <div class="text-center mb-4">
        <img src="assets/images/legience-logo-blue.svg" alt="Legience Logo" height="40">
      </div>

      <div class="text-center mb-4">
        <div class="d-flex justify-content-center mb-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; background: #dbeafe;">
            <i class="ri-lock-unlock-line" style="font-size: 36px; color: #1e56b6;"></i>
          </div>
        </div>
        <h5 class="login-title">Forgot Password?</h5>
        <p class="login-subtitle mt-1">Enter your email and we'll send you a reset link.</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="state.dataState === DataState.ERROR" class="alert alert-danger text-center" role="alert">
        {{ state.error }}
      </div>

      <form #resetPasswordForm="ngForm" (ngSubmit)="resetPassword(resetPasswordForm)">
        <div class="mb-3">
          <label for="email" class="form-label login-label">Email Address</label>
          <input ngModel name="email" type="email" id="email" class="form-control login-input" placeholder="Enter your email address" [disabled]="state.dataState === DataState.LOADING" required>
        </div>

        <div class="mt-4">
          <button [disabled]="state.dataState === DataState.LOADING || resetPasswordForm.invalid || resetPasswordForm.pristine" type="submit" class="btn login-btn w-100">
            <span *ngIf="state.dataState === DataState.LOADING" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="margin-right: 5px;"></span>
            <span *ngIf="state.dataState === DataState.LOADING">Sending...</span>
            <span *ngIf="!(state.dataState === DataState.LOADING)">Send Reset Link</span>
          </button>
        </div>
      </form>

      <div class="mt-4 text-center">
        <a routerLink="/login" class="login-link">
          <i class="ri-arrow-left-line me-1"></i>Back to Sign In
        </a>
      </div>
    </div>
  </div>

  <!-- Success Screen -->
  <div *ngIf="state.registerSuccess" class="login-page d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card text-center">

      <!-- Logo -->
      <div class="mb-4">
        <img src="assets/images/legience-logo-blue.svg" alt="Legience Logo" height="40">
      </div>

      <div class="d-flex justify-content-center mb-4">
        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; background: #dcfce7;">
          <i class="ri-mail-send-line" style="font-size: 36px; color: #16a34a;"></i>
        </div>
      </div>

      <h5 class="login-title mb-2">Check your email</h5>
      <p class="login-subtitle">{{ state.message }}</p>

      <div class="mt-4">
        <a routerLink="/login" class="btn login-btn w-100 text-decoration-none">Back to Sign In</a>
      </div>
    </div>
  </div>

</ng-container>
