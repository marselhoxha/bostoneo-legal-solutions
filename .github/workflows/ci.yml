# =============================================================================
# Legience - CI/CD Pipeline
# =============================================================================
# Owner: Bostoneo Solutions LLC
# Product: Legience (Legal Practice SaaS)
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  id-token: write  # For OIDC

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  # -------------------------------------------------------------------------
  # Backend Tests
  # -------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: legience_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        working-directory: ./backend
        run: |
          mvn test -Dspring.profiles.active=test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/legience_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # -------------------------------------------------------------------------
  # Frontend Tests
  # -------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Environment Files
        env:
          ENV_TS: ${{ secrets.ENV_TS }}
          ENV_PROD_TS: ${{ secrets.ENV_PROD_TS }}
          ENV_STAGING_TS: ${{ secrets.ENV_STAGING_TS }}
        run: |
          mkdir -p src/environments
          printenv ENV_TS > src/environments/environment.ts
          printenv ENV_PROD_TS > src/environments/environment.prod.ts
          printenv ENV_STAGING_TS > src/environments/environment.staging.ts

      - name: Build
        run: npm run build -- --configuration=production

  # -------------------------------------------------------------------------
  # Security Scanning (disabled — requires GitHub Advanced Security / Code Scanning)
  # Re-enable when CodeQL is available on the repository plan
  # -------------------------------------------------------------------------

  # -------------------------------------------------------------------------
  # Build and Push Docker Image
  # -------------------------------------------------------------------------
  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate Firebase Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printenv FIREBASE_SERVICE_ACCOUNT > backend/src/main/resources/firebase-service-account.json

      - name: Generate Backend Config
        run: |
          cat > backend/src/main/resources/application.yml << 'APPYML'
          jwt:
            secret: ${JWT_SECRET:placeholder}
          stripe:
            api:
              key: ${STRIPE_API_KEY:placeholder}
            webhook:
              secret: ${STRIPE_WEBHOOK_SECRET:placeholder}
          legal:
            research:
              courtlistener:
                apiKey: ${COURTLISTENER_API_KEY:}
                baseUrl: https://www.courtlistener.com/api/rest/v4/
          openai:
            api:
              key: ${OPENAI_API_KEY:placeholder}
          twilio:
            account-sid: ${TWILIO_ACCOUNT_SID:}
            auth-token: ${TWILIO_AUTH_TOKEN:}
            phone-number: ${TWILIO_PHONE_NUMBER:}
            whatsapp-number: ${TWILIO_WHATSAPP_NUMBER:}
            enabled: ${TWILIO_ENABLED:true}
            multi-tenant: ${TWILIO_MULTI_TENANT:true}
          boldsign:
            api-key: ${BOLDSIGN_API_KEY:}
            api-url: ${BOLDSIGN_API_URL:https://api.boldsign.com/v1}
            webhook-secret: ${BOLDSIGN_WEBHOOK_SECRET:}
            enabled: ${BOLDSIGN_ENABLED:true}
            default-expiry-days: ${BOLDSIGN_DEFAULT_EXPIRY_DAYS:30}
            reminder-days: ${BOLDSIGN_REMINDER_DAYS:7,3,1}
          encryption:
            secret: ${ENCRYPTION_SECRET:placeholder}
            salt: ${ENCRYPTION_SALT:placeholder}
          server:
            error:
              path: /user/error
              whitelabel:
                enabled: false
            port: ${SERVER_PORT:8085}
            tomcat:
              connection-timeout: 120000
              threads:
                max: 200
          spring:
            profiles:
              active: ${SPRING_PROFILES_ACTIVE:staging}
            autoconfigure:
              exclude:
                - org.springframework.boot.actuate.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration
                - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration
            mvc:
              async:
                request-timeout: 120000
            datasource:
              url: ${DB_URL:jdbc:postgresql://localhost:5432/legience}
              username: ${DB_USERNAME:legience_admin}
              password: ${DB_PASSWORD:}
              driver-class-name: org.postgresql.Driver
              hikari:
                # Pool sized for t3.micro RDS (~100 max_connections); 2 ECS tasks × 20 = 40 connections,
                # leaving headroom for replication/monitoring. min-idle == max for stable fixed-size pool.
                maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
                minimum-idle: ${HIKARI_MIN_IDLE:20}
                connection-timeout: 5000
                idle-timeout: 600000
                max-lifetime: 1500000
                # Validate idle connections so they don't silently die behind AWS NAT 350s idle timeout.
                keepalive-time: 300000
                # Warn if a connection is held > 30s (catches missing transaction boundaries / leaks).
                leak-detection-threshold: 30000
            flyway:
              enabled: true
              baseline-on-migrate: true
              baseline-version: 0
              locations: classpath:db/migration
              validate-on-migrate: false
            jpa:
              database-platform: org.hibernate.dialect.PostgreSQLDialect
              generate-ddl: false
              defer-datasource-initialization: false
              show-sql: false
              hibernate:
                ddl-auto: validate
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.PostgreSQLDialect
                  format_sql: true
                  physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
                  jdbc:
                    time_zone: UTC
            data:
              redis:
                host: ${REDIS_HOST:localhost}
                port: ${REDIS_PORT:6379}
            cache:
              type: redis
            servlet:
              multipart:
                max-file-size: 100MB
                max-request-size: 100MB
            sql:
              init:
                mode: never
            mail:
              host: ${SMTP_HOST:smtp.hostinger.com}
              port: ${SMTP_PORT:465}
              username: ${EMAIL_ID:}
              password: ${EMAIL_PASSWORD:}
              properties:
                mail:
                  smtp:
                    auth: true
                    ssl:
                      enable: true
                    starttls:
                      enable: false
          springdoc:
            api-docs:
              enabled: false
            swagger-ui:
              enabled: false
          management:
            endpoints:
              web:
                exposure:
                  include: health
            endpoint:
              health:
                show-details: never
            health:
              redis:
                enabled: false
          firebase:
            config:
              path: ${FIREBASE_CONFIG_PATH:firebase-service-account.json}
            project:
              id: ${FIREBASE_PROJECT_ID:bostoneo-legal-solutions}
          ai:
            anthropic:
              api-key: ${ANTHROPIC_API_KEY:}
              base-url: https://api.anthropic.com
          UI_APP_URL: ${UI_APP_URL:https://app-staging.legience.com}
          VERIFY_EMAIL_HOST: ${VERIFY_EMAIL_HOST:https://api-staging.legience.com}
          EMAIL_FROM_ADDRESS: hello@legience.com
          EMAIL_FROM_NAME: Legience
          file:
            storage:
              type: ${FILE_STORAGE_TYPE:s3}
              s3-bucket-name: ${FILE_STORAGE_S3_BUCKET_NAME:legience-staging-documents-724629565287}
              s3-region: ${AWS_REGION:us-east-1}
          app:
            cors:
              allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app-staging.legience.com}
            profile-image:
              path: /app/uploads/images
          APPYML

      - name: Build JAR
        working-directory: ./backend
        run: mvn package -DskipTests

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/legience-api
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Deploy Frontend to S3
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        run: npm ci

      - name: Generate Environment Files
        env:
          ENV_TS: ${{ secrets.ENV_TS }}
          ENV_PROD_TS: ${{ secrets.ENV_PROD_TS }}
          ENV_STAGING_TS: ${{ secrets.ENV_STAGING_TS }}
        run: |
          mkdir -p src/environments
          printenv ENV_TS > src/environments/environment.ts
          printenv ENV_PROD_TS > src/environments/environment.prod.ts
          printenv ENV_STAGING_TS > src/environments/environment.staging.ts

      - name: Inject Firebase config into Service Worker
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_FILE="src/environments/environment.prod.ts"
          else
            ENV_FILE="src/environments/environment.staging.ts"
          fi
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('$ENV_FILE', 'utf8');
            const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
            const config = {};
            keys.forEach(k => {
              const m = content.match(new RegExp(k + ':\\\\s*[\"\\x27]([^\"\\x27]+)[\"\\x27]'));
              if (m) config[k] = m[1];
            });
            let sw = fs.readFileSync('src/firebase-messaging-sw.js', 'utf8');
            sw = sw.replace('__FIREBASE_CONFIG__', JSON.stringify(config));
            fs.writeFileSync('src/firebase-messaging-sw.js', sw);
            console.log('Firebase SW config injected:', JSON.stringify(config, null, 2));
          "

      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npm run build -- --configuration=production
          else
            npm run build -- --configuration=staging
          fi

      - name: Deploy to S3
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            BUCKET="legience-production-frontend-${{ secrets.AWS_ACCOUNT_ID }}"
          else
            BUCKET="app-staging.legience.com"
          fi
          # Upload hashed assets with long cache (1 year) - filenames change on new builds
          aws s3 sync dist/velzon s3://$BUCKET --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "*.json" --exclude "firebase-messaging-sw.js"
          # Upload index.html and config files with no-cache so users always get latest
          aws s3 cp dist/velzon/index.html s3://$BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          if [ -f dist/velzon/firebase-messaging-sw.js ]; then
            aws s3 cp dist/velzon/firebase-messaging-sw.js s3://$BUCKET/firebase-messaging-sw.js \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

      - name: Invalidate CloudFront Cache
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            aws cloudfront create-invalidation --distribution-id E219VY98M9RN4Z --paths "/*"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            aws cloudfront create-invalidation --distribution-id E1UWEPT9HA7VQX --paths "/*"
          fi

  # -------------------------------------------------------------------------
  # Trigger ECS Deployment
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-push, deploy-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ALB health check is correct
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TG_NAME="legience-production-api-tg"
          else
            TG_NAME="legience-staging-api-tg"
          fi
          TG_ARN=$(aws elbv2 describe-target-groups --names $TG_NAME --query 'TargetGroups[0].TargetGroupArn' --output text)
          aws elbv2 modify-target-group --target-group-arn $TG_ARN --health-check-path /health --matcher HttpCode=200

      - name: Update task definition health check
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            FAMILY="legience-production-api"
          else
            FAMILY="legience-staging-api"
          fi
          # Get current task definition and update container health check
          CURRENT_TD=$(aws ecs describe-task-definition --task-definition $FAMILY --query 'taskDefinition' --output json)
          # Use git SHA as image tag for unique deploys (branch tag may be cached by ECS)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/legience-api:${{ github.ref_name }}-${SHORT_SHA}"
          echo "Deploying image: $IMAGE"
          NEW_TD=$(echo "$CURRENT_TD" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          for c in td['containerDefinitions']:
              c['healthCheck'] = {
                  'command': ['CMD-SHELL', 'curl -f http://localhost:8085/health || exit 1'],
                  'interval': 30, 'timeout': 5, 'retries': 3, 'startPeriod': 300
              }
              c['image'] = '$IMAGE'
          print(json.dumps(td, default=str))
          ")
          aws ecs register-task-definition --cli-input-json "$NEW_TD" > /dev/null
          echo "Registered new task definition with correct health check"

      - name: Deploy to ECS
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            CLUSTER="legience-production"
            SERVICE="legience-production-api"
            FAMILY="legience-production-api"
          else
            CLUSTER="legience-staging"
            SERVICE="legience-staging-api"
            FAMILY="legience-staging-api"
          fi
          aws ecs update-service --cluster $CLUSTER --service $SERVICE \
            --task-definition $FAMILY \
            --health-check-grace-period-seconds 360 \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            CLUSTER="legience-production"
            SERVICE="legience-production-api"
          else
            CLUSTER="legience-staging"
            SERVICE="legience-staging-api"
          fi
          echo "Waiting for ECS service $SERVICE to become stable (up to 30 minutes)..."
          for i in $(seq 1 60); do
            ROLLOUT=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE \
              --query 'services[0].deployments[0].rolloutState' --output text 2>/dev/null || echo "UNKNOWN")
            RUNNING=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE \
              --query 'services[0].runningCount' --output text 2>/dev/null || echo "0")
            DESIRED=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
            echo "Attempt $i/60 — rolloutState=$ROLLOUT running=$RUNNING desired=$DESIRED"
            if [ "$ROLLOUT" = "COMPLETED" ]; then
              echo "Deployment completed successfully."
              exit 0
            elif [ "$ROLLOUT" = "FAILED" ]; then
              echo "Deployment failed."
              exit 1
            fi
            sleep 30
          done
          echo "Deployment timed out after 30 minutes."
          exit 1

